services:
  accounts:
    image: "sandeeprawat98/accounts:s4"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - moneybank
  loans:
    image: "sandeeprawat98/loans:s4"
    container_name: loans-ms
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - moneybank
  cards:
    image: "sandeeprawat98/cards:s4"
    container_name: cards-ms
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - moneybank
networks:
  moneybank:
    driver: "bridge"